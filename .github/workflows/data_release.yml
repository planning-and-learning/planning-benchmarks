name: data release

on:
  push:
    tags:
      - "data-v*"

jobs:
  release-data:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'planning-and-learning'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pypddl and package
        run: pip install 'pypddl>=1.0.23,<1.1' -e .
      - name: Validate layout and PDDL content
        # reports must not land inside data/ (they would end up in the archive)
        run: python -m pypddl_datasets.validation --root data --strict --success-output /tmp/validate.success.json --error-output /tmp/validate.error.json
      - name: Check requirements metadata is up to date
        run: python -m pypddl_datasets.validation.requirements --root data
      - name: Package data
        # prints the archive sha256 -> pin it as DATA_SHA256 in the package
        run: python -m pypddl_datasets.scripts.package_data --output dist-data/data.tar.gz
      - name: Create release and upload data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
              --notes "Benchmark data for pypddl-datasets (pinned via DATA_VERSION=$GITHUB_REF_NAME). Do not delete: published package versions depend on it."
          gh release upload "$GITHUB_REF_NAME" dist-data/data.tar.gz --clobber
