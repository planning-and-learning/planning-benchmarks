name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'planning-and-learning'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check version matches tag
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: pyproject.toml=$VERSION tag=$TAG"
            exit 1
          fi
      - name: Check pinned data release
        run: |
          python - <<'EOF'
          import hashlib, re, urllib.request
          from pathlib import Path

          text = Path("src/pypddl_datasets/__init__.py").read_text()
          version = re.search(r'DATA_VERSION = "([^"]+)"', text).group(1)
          sha = re.search(r'DATA_SHA256 = "([^"]*)"', text).group(1)
          assert sha, "DATA_SHA256 is empty: cut a data release and pin it first"
          url = ("https://github.com/planning-and-learning/planning-benchmarks"
                 f"/releases/download/{version}/data.tar.gz")
          digest = hashlib.sha256(urllib.request.urlopen(url).read()).hexdigest()
          assert digest == sha, f"pinned sha256 {sha} != released {digest}"
          print(f"data pin OK: {version}")
          EOF
      - name: Build distributions
        run: |
          pip install build
          python -m build
          find dist -maxdepth 1 -type f
      - name: Check wheel contains no benchmark data
        run: |
          python - <<'EOF'
          import glob, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          bad = [n for n in names if n.endswith(".pddl") and "/generators/" not in n]
          assert not bad, bad
          print(f"{wheel}: {len(names)} files, no benchmark data")
          EOF
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
