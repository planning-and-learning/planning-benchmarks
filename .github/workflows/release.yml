name: release

on:
  push:
    tags:
      - "v*"

jobs:
  # validate and package share one job: a failed validation aborts before any
  # upload, and the 1.4 GB LFS checkout happens only once per release.
  release-data:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'planning-and-learning'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check version matches tag
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: pyproject.toml=$VERSION tag=$TAG"
            exit 1
          fi
      - name: Install pypddl
        run: pip install pypddl
      - name: Validate all PDDL
        run: python validate.py --root data
      - name: Package data into per-domain tarballs
        run: python scripts/package_data.py --output dist-data
      - name: Create draft release and upload data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" \
              --notes "Benchmark data for pypddl-datasets $GITHUB_REF_NAME."
          gh release upload "$GITHUB_REF_NAME" dist-data/* --clobber
      - uses: actions/upload-artifact@v5
        with:
          name: registry
          path: dist-data/registry.txt

  publish:
    needs: release-data
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v5
        with:
          name: registry
          path: registry-artifact
      - name: Inject registry into package
        run: cp -f registry-artifact/registry.txt src/pypddl_datasets/registry.txt
      - name: Build distributions
        run: |
          pip install build
          python -m build
          find dist -maxdepth 1 -type f
      - name: Check wheel
        run: |
          python - <<'EOF'
          import glob, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          archive = zipfile.ZipFile(wheel)
          names = archive.namelist()
          bad = [n for n in names if n.endswith(".pddl") and "/generators/" not in n]
          assert not bad, bad
          registry = next(n for n in names if n.endswith("registry.txt"))
          entries = [l for l in archive.read(registry).decode().splitlines() if l and not l.startswith("#")]
          assert entries, "registry.txt is empty"
          print(f"{wheel}: {len(entries)} registry entries, no benchmark data")
          EOF
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
